spring:
  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      minimum-idle: 1
      maximum-pool-size: 2

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        hbm2ddl.auto: none
        default_schema: public

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 2525
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false

supabase:
  jwt:
    issuer: http://localhost:0/fake-issuer
    jwks-url: http://localhost:0/fake-jwks

playzone:
  correo:
    remitente: test@playzone.com
    nombre-remitente: PlayZone Test
    alertas-admin: test-admin@playzone.com

