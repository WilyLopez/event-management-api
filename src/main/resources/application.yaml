
spring:
  config:
    import:
      - "optional:file:./.env[.properties]"
      - "optional:file:../.env[.properties]"
      - "optional:file:pems/.env[.properties]"

  application:
    name: playzone-pems

  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/BDGestionEvento}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PlayZone-HikariPool
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        hbm2ddl.auto: none
        jdbc:
          time_zone: America/Lima

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    encoding: UTF-8
    schemas: public

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:tucorreo@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false
    default-encoding: UTF-8

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/Lima

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Kiki y Lala PEMS
    version: 1.0.0
    description: Kiki y Lala Event Management System


springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false

supabase:
  jwt:
    issuer: ${SUPABASE_JWT_ISSUER:https://divljjsnorvkrgcznwlh.supabase.co/auth/v1}
    jwks-url: ${SUPABASE_JWKS_URL:https://divljjsnorvkrgcznwlh.supabase.co/auth/v1/.well-known/jwks.json}
  auth:
    anon-key: ${SUPABASE_ANON_KEY:}
  storage:
    endpoint: ${SUPABASE_STORAGE_S3_ENDPOINT:https://divljjsnorvkrgcznwlh.supabase.co/storage/v1/s3}
    access-key: ${SUPABASE_STORAGE_ACCESS_KEY:}
    secret-key: ${SUPABASE_STORAGE_SECRET_KEY:}
    region: ${SUPABASE_STORAGE_REGION:us-east-2}
    bucket-publico: ${SUPABASE_STORAGE_BUCKET_PUBLICO:kiki-publico}
    bucket-privado: ${SUPABASE_STORAGE_BUCKET_PRIVADO:kiki-privado}
    bucket-comprobantes: ${SUPABASE_STORAGE_BUCKET_COMPROBANTES:comprobantes}
    url-publica: ${SUPABASE_STORAGE_URL_PUBLICA:https://divljjsnorvkrgcznwlh.supabase.co/storage/v1/object/public}
    max-tamanio-mb: 10

playzone:

  url-base: ${APP_URL:http://localhost:8080}

  cors:
    origenes-permitidos: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

  # SUNAT / Nubefact
  sunat:
    nubefact:
      url: ${NUBEFACT_URL:https://api.nubefact.com}
      token: ${NUBEFACT_TOKEN:changeme}
      ruc: ${NUBEFACT_RUC:20000000001}

  # HTTP client
  http:
    connect-timeout-ms: 5000
    read-timeout-ms: 10000

logging:
  level:
    root: INFO
    com.playzone.pems: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

