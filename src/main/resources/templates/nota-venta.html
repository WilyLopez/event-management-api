<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Nota de Venta</title>
<style>
  @page {
    size: 80mm 220mm;
    margin: 0;
  }
  body {
    font-family: monospace;
    font-size: 10px;
    margin: 2mm 3mm;
    padding: 0;
    color: #000;
    background: #fff;
  }
  .header {
    text-align: center;
    margin-bottom: 12px;
  }
  .title {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
  }
  .info-group {
    margin-bottom: 10px;
  }
  .row {
    display: flex;
    justify-content: space-between;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
  }
  th, td {
    text-align: left;
    padding: 3px;
    border-bottom: 1px dashed #000;
  }
  .right {
    text-align: right;
  }
  .total-section {
    margin-top: 10px;
    text-align: right;
  }
  .footer {
    margin-top: 20px;
    text-align: center;
    font-size: 9px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="title">NOTA DE VENTA INTERNA</div>
    <div th:text="${nombreSede}">Sede Principal</div>
    <div>Documento no válido para fines tributarios</div>
  </div>

  <div class="info-group">
    <div><strong>Venta ID:</strong> <span th:text="${'V-' + venta.id}">V-1</span></div>
    <div><strong>Fecha:</strong> <span th:text="${#temporals.format(venta.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</span></div>
    <div><strong>Tipo:</strong> <span th:text="${venta.tipo}">RESERVA</span></div>
    <div><strong>Canal:</strong> <span th:text="${venta.canalCodigo}">MOSTRADOR</span></div>
  </div>

  <div class="info-group">
    <div><strong>Cliente:</strong> <span th:text="${venta.nombreCliente != null ? venta.nombreCliente : (venta.nombreAcompanante != null ? venta.nombreAcompanante : 'Mostrador')}">Invitado</span></div>
    <div th:if="${venta.dniAcompanante != null}"><strong>DNI:</strong> <span th:text="${venta.dniAcompanante}"></span></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Concepto</th>
        <th class="right">Monto</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Subtotal</td>
        <td class="right" th:text="${'S/ ' + #numbers.formatDecimal(venta.subtotal, 1, 2)}">S/ 0.00</td>
      </tr>
      <tr>
        <td>Descuento</td>
        <td class="right" th:text="${'-S/ ' + #numbers.formatDecimal(venta.descuento, 1, 2)}">-S/ 0.00</td>
      </tr>
      <tr>
        <td><strong>TOTAL</strong></td>
        <td class="right"><strong th:text="${'S/ ' + #numbers.formatDecimal(venta.total, 1, 2)}">S/ 0.00</strong></td>
      </tr>
    </tbody>
  </table>

  <div class="total-section">
    <div><strong>Pagos / Efectivo Recibido:</strong> <span th:text="${'S/ ' + #numbers.formatDecimal(venta.efectivoRecibido, 1, 2)}"></span></div>
    <div><strong>Vuelto:</strong> <span th:text="${'S/ ' + #numbers.formatDecimal(venta.vuelto, 1, 2)}"></span></div>
  </div>

  <div class="footer">
    *** FIN DE LA NOTA ***
  </div>
</body>
</html>
